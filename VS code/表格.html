<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form{
            width: 255px;
        }
    </style>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>用户登录</legend>
            <span>用户名:</span>
            <input type="text" name="username" placeholder="请输入用户名">
            <hr/>
            <span>密码:</span>
            <input type="text" name="password" placeholder="请输入密码">
            <hr/>
            <span>头像:</span>
            <input type="file" name="" id="">
            <hr/>
            <span>生日:</span>
            <input type="datetime-local" name="" id="">
            <hr/>
            <span>喜欢的颜色:</span>
            <input type="color" name="" id="">
            <hr>
            <span>幸运数字:</span>
            <input type="text"><br/>
            <input type="radio" name="sex" value="man" id="">男
            <input type="radio" name="sex" value="woman" id="">女
            <input type="radio" name="sex" value="s" id="">保密
            <hr/>
            <span>爱好:</span>
            <input type="checkbox" name="chouyan" id="">抽烟
            <input type="checkbox" name="hejiu" id="">喝酒
            <input type="checkbox" name="tangtou" id="">烫头
            <hr/>
            <span>籍贯:</span>
            <select name="" id="">
                <option value="">北京</option>
                <option value="">上海</option>
                <option value="">南京</option>
                <option value="">广州</option>
                <option value="">重庆</option>
            </select><br>
            <textarea name="" id="" cols="30" rows="10" placeholder="个人简介"></textarea><br>
            <input type="reset" value="重置">
            <input type="submit" value="提交">
        </fieldset>
    </form>
</body>
</html>
